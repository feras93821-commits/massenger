{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>تسجيل الدخول - المنصة الداخلية</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #198754, #157347);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 18px;
            padding: 35px 30px 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            position: relative;
        }

        .logo-img {
            max-width: 110px;
            margin-bottom: 15px;
        }

        .platform-title {
            font-weight: 800;
            color: #198754;
            margin-bottom: 5px;
        }

        .platform-subtitle {
            color: #6c757d;
            margin-bottom: 25px;
        }

        .form-control {
            border-radius: 10px;
        }

        .form-control:focus {
            border-color: #198754;
            box-shadow: 0 0 0 0.2rem rgba(25, 135, 84, 0.25);
        }

        .btn-login {
            background-color: #198754;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            padding: 10px;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background-color: #157347;
        }

        .footer-text {
            margin-top: 25px;
            font-size: 12px;
            color: #adb5bd;
        }

        .footer-text span {
            color: #198754;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="login-wrapper text-center">

        <!-- الشعار -->
        <img src="{% static 'core/images/logo.jpg' %}" alt="شعار الشركة" class="logo-img">

        <h4 class="platform-title">محروقات</h4>
        <div class="platform-subtitle">منصة المراسلات الداخلية</div>

        <form method="post" class="text-start">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label small text-muted">اسم المستخدم</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label small text-muted">كلمة المرور</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-login w-100">تسجيل الدخول</button>
        </form>

        {% if form.errors %}
        <div class="alert alert-danger mt-3 small text-center">
            اسم المستخدم أو كلمة المرور غير صحيحة
        </div>
        {% endif %}

        <!-- الهامش السفلي -->
        <div class="footer-text">
            صُمِّم بواسطة <span>م. حسن سليم حسن</span>
        </div>

    </div>

</body>

</html>
